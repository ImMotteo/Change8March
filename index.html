<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="main.css" />
    <title>С 8 марта!</title>
  </head>
  <body>
    <!-- Декоративные цветы на фоне -->
    <div class="flower-bg">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="container">
      <!-- Карточка входа. Просим логин и пароль -->
      <div id="authCard" class="auth-card">
        <h1><span>🌷</span> 8 марта</h1>
        <div class="subtitle">введите секретный код для входа</div>

        <div class="input-group">
          <label>Логин</label>
          <input
            type="text"
            id="loginInput"
            placeholder="Твой рабочий логин"
            autocomplete="off"
          />
        </div>

        <div class="input-group">
          <label>Пароль</label>
          <input
            type="password"
            id="passwordInput"
            placeholder="••••••"
            autocomplete="off"
          />
        </div>

        <button class="btn" id="loginBtn">🌸 войти</button>

        <!-- Подсказка для входа -->
        <div class="hint">
          <span>💡 Логин - </span> твой рабочий email
          <span>💡 Пароль:</span> Change
        </div>

        <!-- Место для ошибки -->
        <div id="authError" class="error-message"></div>
      </div>

      <!-- Основной экран. Появляется после успешного входа -->
      <div id="contentScreen" class="content-screen hidden">
        <div class="content-box">
          <div class="content-header">
            <!-- Кнопка "Поздравления". Изначально скрыта -->
            <button class="show-conratulations btn">Поздравления</button>
            <h2 id="contentTitle">🌸 привет!</h2>
          </div>

          <!-- Сюда подставится персональный контент -->
          <div id="dynamicContent" class="dynamic-content">
            <!-- Заполняется из JavaScript -->
          </div>

          <!-- Кнопка возврата на карточку входа -->
          <button class="back-btn" id="logoutBtn">← Вернуться</button>
        </div>
        <footer>✨ с праздником весны ✨</footer>
      </div>

      <!-- Блок с коллективными поздравлениями -->
      <!-- Изначально скрыт. Появляется по кнопке "Поздравления" -->
      <div class="conratulations-box">
        <!-- Кнопка возврата к основному контенту -->
        <button class="hide-conratulations btn">Вернуться</button>

        <!-- Сами поздравления -->
        <div class="congratulation">
          <span class="congratulation__title">Игорь</span>
          <span class="congratulation__text congratulation__text-igor"> </span>
        </div>

        <div class="congratulation">
          <span class="congratulation__title">Лёша</span>
          <span class="congratulation__text congratulation__text-alex"> </span>
        </div>

        <div class="congratulation">
          <span class="congratulation__title">Мацко Антон</span>
          <span class="congratulation__text congratulation__text-antonM">
          </span>
        </div>

        <div class="congratulation">
          <span class="congratulation__title">Куликов Антон</span>
          <span class="congratulation__text congratulation__text-antonK">
          </span>
        </div>

        <div class="congratulation">
          <span class="congratulation__title">Костя</span>
          <span class="congratulation__text congratulation__text-kostya">
          </span>
        </div>

        <div class="congratulation">
          <span class="congratulation__title">Денис</span>
          <span class="congratulation__text congratulation__text-denis"> </span>
        </div>

        <div class="congratulation">
          <span class="congratulation__title">Максим</span>
          <span class="congratulation__text congratulation__text-max"> </span>
        </div>
      </div>
    </div>

    <!-- Подключаем JavaScript -->
    <script src="main.js"></script>
  </body>
</html>
